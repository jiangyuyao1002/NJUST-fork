name: Code QA NJUST_AI_CJ

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, ready_for_review, synchronize]
        branches: [main]

jobs:
    check-translations:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Verify all translations are complete
              run: node scripts/find-missing-translations.js

    knip:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Run knip checks
              run: pnpm knip

    repository-hygiene:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Check repository hygiene and dependency policy seed
              run: pnpm syncpack:lint

    compile:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Lint
              run: pnpm lint
            - name: Check types
              run: pnpm check-types

    unit-test:
        name: platform-unit-test (${{ matrix.name }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      name: ubuntu-latest
                    - os: windows-latest
                      name: windows-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Run unit tests
              run: pnpm test

    coverage:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0 # 获取完整历史用于 PR 比较
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Run src tests with coverage
              run: pnpm test:coverage
            - name: Run prompt-engine tests with coverage
              run: pnpm --filter @njust-ai-cj/prompt-engine test:coverage
            - name: Run webview-ui tests with coverage
              run: pnpm --filter webview-ui test:coverage
            - name: Upload src coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                token: ${{ secrets.CODECOV_TOKEN }}
                files: ./coverage/src/coverage-final.json
                flags: src
                fail_ci_if_error: false
                verbose: true
            - name: Upload webview-ui coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                token: ${{ secrets.CODECOV_TOKEN }}
                files: ./coverage/webview-ui/coverage-final.json
                flags: webview-ui
                fail_ci_if_error: false
                verbose: true
            - name: Upload prompt-engine coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                token: ${{ secrets.CODECOV_TOKEN }}
                files: ./coverage/prompt-engine/coverage-final.json
                flags: prompt-engine
                fail_ci_if_error: false
                verbose: true

    check-secrets:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Scan for secrets
              run: node scripts/check-secrets.mjs --all-files

    vulnerability-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm
            - name: Run pnpm audit (high)
              continue-on-error: true
              run: pnpm audit --audit-level=high
            - name: Run pnpm audit (critical)
              run: pnpm audit --audit-level=critical
            - name: Run src package audit (high)
              continue-on-error: true
              run: cd src && pnpm audit --audit-level=high
            - name: Run src package audit (critical)
              run: cd src && pnpm audit --audit-level=critical
