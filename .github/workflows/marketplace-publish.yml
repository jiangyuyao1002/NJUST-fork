name: Publish Extension

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

env:
  GIT_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'main' }}

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    if: >
        ( github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        contains(github.event.pull_request.title, 'Changeset version bump') ) ||
        github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_REF }}
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
      - name: Scan for secrets
        run: node scripts/check-secrets.mjs --all-files
      - name: Lint
        run: pnpm lint
      - name: Check types
        run: pnpm check-types
      - name: Build types package
        run: pnpm --filter @njust-ai/types build
      - name: Run unit tests
        run: pnpm test

  publish-extension:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing tags.
    if: >
        ( github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        contains(github.event.pull_request.title, 'Changeset version bump') ) ||
        github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_REF }}
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Package Extension
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: |
          current_package_version=$(node -p "require('./src/package.json').version")
          pnpm vsix

          # Save VSIX contents to a temporary file to avoid broken pipe issues.
          unzip -l bin/njust-ai-${current_package_version}.vsix > /tmp/Njust-AI-vsix-contents.txt

          # Check for required files.
          grep -q "extension/package.json" /tmp/Njust-AI-vsix-contents.txt || exit 1
          grep -q "extension/package.nls.json" /tmp/Njust-AI-vsix-contents.txt || exit 1
          grep -q "extension/dist/extension.js" /tmp/Njust-AI-vsix-contents.txt || exit 1
          grep -q "extension/webview-ui/audio/celebration.wav" /tmp/Njust-AI-vsix-contents.txt || exit 1
          grep -q "extension/webview-ui/build/assets/index.js" /tmp/Njust-AI-vsix-contents.txt || exit 1
          grep -q "extension/assets/codicons/codicon.ttf" /tmp/Njust-AI-vsix-contents.txt || exit 1
          grep -q "extension/assets/vscode-material-icons/icons/3d.svg" /tmp/Njust-AI-vsix-contents.txt || exit 1

          # Verify .env file is NOT included in the VSIX (secrets should not be packaged).
          if grep -q "^.*\.env$" /tmp/Njust-AI-vsix-contents.txt; then
            echo "ERROR: .env file found in VSIX package — secrets must not be distributed!"
            exit 1
          fi
          
          # Clean up temporary file.
          rm /tmp/Njust-AI-vsix-contents.txt
      - name: Create and Push Git Tag
        run: |
          current_package_version=$(node -p "require('./src/package.json').version")
          git tag -a "v${current_package_version}" -m "Release v${current_package_version}"
          git push origin "v${current_package_version}" --no-verify
          echo "Successfully created and pushed git tag v${current_package_version}"
      - name: Publish Extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          current_package_version=$(node -p "require('./src/package.json').version")
          pnpm --filter njust-ai publish:marketplace
          echo "Successfully published version $current_package_version to VS Code Marketplace"
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_package_version=$(node -p "require('./src/package.json').version")

          # Extract changelog for current version
          echo "Extracting changelog for version ${current_package_version}"
          changelog_content=$(sed -n "/## \\[${current_package_version}\\]/,/## \\[/p" CHANGELOG.md | sed '$d')

          # If changelog extraction failed, use a default message
          if [ -z "$changelog_content" ]; then
            echo "Warning: No changelog section found for version ${current_package_version}"
            changelog_content="Release v${current_package_version}"
          else
            echo "Found changelog section for version ${current_package_version}"
          fi

          # Create release with changelog content
          gh release create "v${current_package_version}" \
            --title "Release v${current_package_version}" \
            --notes "$changelog_content" \
            --target ${{ env.GIT_REF }} \
            bin/njust-ai-${current_package_version}.vsix
          echo "Successfully created GitHub Release v${current_package_version}"
