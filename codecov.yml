# codecov.yml - Codecov 配置文件

codecov:
  require_ci_to_pass: true
  notify:
    # 等待所有 CI 完成后再发送通知
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        # 项目整体覆盖率目标
        target: 85%
        # 允许的覆盖率下降幅度
        threshold: 2%
        # 如果覆盖率下降超过阈值，PR 会失败
        if_ci_failed: error
    patch:
      default:
        # 新代码的覆盖率目标
        target: 80%
        # 新代码允许的最低覆盖率
        threshold: 5%

  # 覆盖率变化的通知规则
  changes:
    default:
      # 覆盖率变化超过 1% 时通知
      threshold: 1%

# 忽略的文件和目录
ignore:
  - "**/__tests__/**"
  - "**/__mocks__/**"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/coverage/**"
  - "**/*.config.ts"
  - "**/*.config.js"
  - "**/vitest.config.ts"
  - "**/eslint.config.mjs"
  - "**/tsconfig.json"
  - "**/package.json"
  - "**/pnpm-lock.yaml"
  - "**/.turbo/**"
  - "**/test-workspace/**"
  - "scripts/**"
  - "docs/**"
  - "*.md"
  - "*.yml"
  - "*.yaml"

# PR 评论配置
comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

  # 自定义评论格式
  after_n_builds: 2 # 等待 2 个 CI job 完成后再评论

  # 显示覆盖率变化的文件
  show_critical_paths: true

# 覆盖率标志（用于区分不同包的覆盖率）
flags:
  src:
    paths:
      - "src/"
    carryforward: true
  webview-ui:
    paths:
      - "webview-ui/"
    carryforward: true
  packages:
    paths:
      - "packages/"
    carryforward: true

# 覆盖率报告上传配置
fixes:
  # 修复路径前缀（如果覆盖率报告中的路径与仓库路径不匹配）
  - "::src/"
